<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Login | ShareBite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="site-header page-header">
    <a class="brand" href="index.html" aria-label="ShareBite home"><span class="brand-mark">SB</span><span>ShareBite</span></a>
    <button class="menu-toggle" type="button" aria-controls="mainNav" aria-expanded="false"><span></span><span></span><span></span>Menu</button>
    <nav class="nav" id="mainNav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="listings.html">Food listings</a>
      <a href="ngo.html">NGO access</a>
      <a href="ngo-feedback.html">NGO feedback</a>
      <a href="signup.html">Sign up</a>
    </nav>
  </header>

  <main id="main">
    <section class="page-hero">
      <p class="eyebrow">NGO portal</p>
      <h1>NGO login</h1>
      <p>Login to browse approved food listings and reserve direct pickup.</p>
    </section>

    <section class="section single-form">
      <form class="form-panel login-panel" data-login-role="ngo" aria-labelledby="ngo-login-title">
        <div class="section-heading inline">
          <p class="eyebrow">Account login</p>
          <h2 id="ngo-login-title">Access NGO portal</h2>
        </div>
        <label>Email<input class="login-email" type="email" placeholder="Enter NGO email" autocomplete="email" required></label>
        <label>Password<input class="login-password" type="password" placeholder="Enter password" autocomplete="current-password" required></label>
        <button class="button primary full" type="submit">Login as NGO</button>
        <p class="form-note login-message" role="status"></p>
        <a class="button dark full" href="signup.html">Create new account</a>
      </form>
    </section>
  </main>

  <footer class="footer"><span>ShareBite prototype</span><span>NGO login page</span></footer>
  <script src="script.js"></script>
</body>
</html>
