<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Login | ShareBite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="site-header page-header">
    <a class="brand" href="index.html" aria-label="ShareBite home"><span class="brand-mark">SB</span><span>ShareBite</span></a>
    <button class="menu-toggle" type="button" aria-controls="mainNav" aria-expanded="false"><span></span><span></span><span></span>Menu</button>
    <nav class="nav" id="mainNav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="donate.html">Donate food</a>
      <a href="supplier.html">Supplier approval</a>
      <a href="signup.html">Sign up</a>
    </nav>
  </header>

  <main id="main">
    <section class="page-hero">
      <p class="eyebrow">Supplier portal</p>
      <h1>Supplier login</h1>
      <p>Login to approve food donations and prepare NGO email notifications.</p>
    </section>

    <section class="section single-form">
      <form class="form-panel login-panel" data-login-role="supplier" aria-labelledby="supplier-login-title">
        <div class="section-heading inline">
          <p class="eyebrow">Account login</p>
          <h2 id="supplier-login-title">Access supplier portal</h2>
        </div>
        <label>Email<input class="login-email" type="email" placeholder="Enter supplier email" autocomplete="email" required></label>
        <label>Password<input class="login-password" type="password" placeholder="Enter password" autocomplete="current-password" required></label>
        <button class="button primary full" type="submit">Login as Supplier</button>
        <p class="form-note login-message" role="status"></p>
        <a class="button dark full" href="signup.html">Create new account</a>
      </form>
    </section>
  </main>

  <footer class="footer"><span>ShareBite prototype</span><span>Supplier login page</span></footer>
  <script src="script.js"></script>
</body>
</html>
